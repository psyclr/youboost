services:
  postgres:
    image: postgres:15-alpine
    container_name: youboost-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: youboost_dev
      POSTGRES_USER: youboost
      POSTGRES_PASSWORD: youboost_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U youboost']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: youboost-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youboost-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://youboost:youboost_dev_password@postgres:5432/youboost_dev
      REDIS_URL: redis://redis:6379
      NODE_TLS_REJECT_UNAUTHORIZED: '0'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youboost-migrate
    environment:
      DATABASE_URL: postgresql://youboost:youboost_dev_password@postgres:5432/youboost_dev
    command: npx prisma migrate deploy
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youboost-seed
    environment:
      DATABASE_URL: postgresql://youboost:youboost_dev_password@postgres:5432/youboost_dev
    entrypoint: npx ts-node prisma/seed.ts
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: youboost-frontend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      API_URL: http://backend:3000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
